# Default registry configuration (derived from upstream cmd/registry/config-example.yml).
# Anonymous push/pull; enable auth (e.g. htpasswd) for production — see
# /usr/share/doc/docker-registry/examples/config-example.yml
version: 0.1
log:
  fields:
    service: registry
storage:
  cache:
    blobdescriptor: inmemory
  filesystem:
    rootdirectory: /var/lib/registry
  tag:
    concurrencylimit: 8
http:
  addr: :5000
  headers:
    X-Content-Type-Options: [nosniff]
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
